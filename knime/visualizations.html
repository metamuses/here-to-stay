<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plotly Sandbox - English Version</title>

    <link rel="stylesheet" href="visualizations.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <h1>Project Dashboard</h1>
    <p>This chart is powered by Plotly.js and customized with your site's branding.</p>

    <div id="line-plot1"></div>

    <div id="line-plot2"></div>

    <div id="line-plot3"></div>

    <div id="line-plot4"></div>

    <div id="student-chart" style="width: 100%; height: 800px;"></div>

    <div id="sensitivity-plot" style="width: 100%; height: 800px;"></div>

    <div class="map-controls">
        <h3>University Enrollment by Year</h3>
        <div class="custom-select">
            <label>Academic Year: </label>
            <select id="yearSelect"></select>
        </div>
    </div>
    <div id="map" style="height: 600px; width: 100%;"></div>


    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js" charset="utf-8"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="visualizations.js" defer></script>
</body>
</html>
